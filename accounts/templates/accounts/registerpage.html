{% extends 'accounts/base.html' %}

{% block content %}
<div class="row justify-content-center mt-4 mb-5">
    <div class="col-md-6"> <div class="card shadow-sm">
            <div class="card-header bg-success text-white text-center">
                <h3 class="mb-0">Create an Account</h3>
            </div>
            
            <div class="card-body p-4">
                <form method="post" enctype="multipart/form-data">
                    {% csrf_token %}
                    
                    {{ form.as_p }}
                    
                    <button type="submit" class="btn btn-success w-100 mt-3">Sign Up</button>
                </form>
                
                <div class="text-center mt-3">
                    <small>Already have an account? <a href="{% url 'login' %}" class="text-decoration-none">Log in here</a></small>
                </div>
            </div>
        </div>

    </div>
</div>
{% endblock %}
