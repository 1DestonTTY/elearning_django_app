{% extends 'accounts/base.html' %}

{% block content %}
<div class="row justify-content-center mt-4">
    <div class="col-md-8">
        
        <div class="card shadow-sm">
            <div class="card-header bg-primary text-white">
                <h3 class="mb-0">Create a New Course</h3>
            </div>
            
            <div class="card-body p-4">
                <form method="post">
                    {% csrf_token %}
                    
                    {{ form.as_p }}
                    
                    <button type="submit" class="btn btn-primary w-100 mt-3">Create Course</button>
                </form>
            </div>
            
            <div class="card-footer bg-white border-top-0 text-center pb-3">
                <a href="{% url 'home' %}" class="btn btn-outline-secondary btn-sm">Back to Dashboard</a>
            </div>
        </div>
        
    </div>
</div>
{% endblock %}
